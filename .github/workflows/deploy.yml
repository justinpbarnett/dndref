name: CI and Deploy

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  WRANGLER_VERSION: '4.84.1'
  CLOUDFLARE_PAGES_PROJECT: dnd-ref
  WORKER_CONFIG: workers/cors-proxy/wrangler.toml

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    outputs:
      worker_changed: ${{ steps.worker-changes.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build web
        run: npx expo export --platform web

      - name: Detect Worker changes
        id: worker-changes
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi

          if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
            if git rev-parse HEAD^ >/dev/null 2>&1; then
              base="HEAD^"
            else
              echo "changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          changed_files="$(git diff --name-only "$base" "${{ github.sha }}")"
          if grep -Eq '^(workers/cors-proxy/|package\.json$|package-lock\.json$)' <<< "$changed_files"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload web build
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist
          if-no-files-found: error
          retention-days: 1

  deploy-pages:
    name: Deploy Cloudflare Pages
    needs: verify
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://dndref.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist

      - name: Deploy Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          : "${CLOUDFLARE_API_TOKEN:?Set CLOUDFLARE_API_TOKEN repository secret}"
          : "${CLOUDFLARE_ACCOUNT_ID:?Set CLOUDFLARE_ACCOUNT_ID repository secret}"

          npx --yes wrangler@${{ env.WRANGLER_VERSION }} pages deploy dist \
            --project-name "${{ env.CLOUDFLARE_PAGES_PROJECT }}" \
            --branch "${{ github.ref_name }}" \
            --commit-hash "${{ github.sha }}" \
            --commit-message "$(git log -1 --pretty=%s)" \
            --commit-dirty=false

  deploy-worker:
    name: Deploy Cloudflare Worker
    needs: verify
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && needs.verify.outputs.worker_changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://proxy.dndref.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Cloudflare Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          : "${CLOUDFLARE_API_TOKEN:?Set CLOUDFLARE_API_TOKEN repository secret}"
          : "${CLOUDFLARE_ACCOUNT_ID:?Set CLOUDFLARE_ACCOUNT_ID repository secret}"

          npx --yes wrangler@${{ env.WRANGLER_VERSION }} deploy \
            --config "${{ env.WORKER_CONFIG }}"
